<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Injection DSM Extractor · SLDC Gujarat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07090c; --bg2:#0d1117; --bg3:#131821; --bg4:#1e2430;
      --surface:rgba(30, 36, 48, 0.4); --surface2:rgba(37, 43, 53, 0.6);
      --accent:#00d9ff; --accent2:#0088ff; --accent-dim:rgba(0,217,255,0.08); --accent-glow:rgba(0,217,255,0.15);
      --text:#f8fafc; --text2:#94a3b8; --text3:#64748b;
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.12);
      --r:16px; --r2:10px;
    }
    html,body,#root { height:100%; width:100%; }
    body { 
      font-family:'DM Sans',sans-serif; 
      background:var(--bg); 
      color:var(--text); 
      font-size:14px; 
      line-height:1.6; 
      overflow:hidden; 
      position:relative;
    }
    /* Animated Gradient Background */
    .bg-mesh {
      position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
      background-image: 
        radial-gradient(at 0% 0%, rgba(0, 217, 255, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(13, 17, 23, 1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 136, 255, 0.05) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(7, 9, 12, 1) 0px, transparent 50%);
      background-size: 200% 200%;
      animation: meshAnim 15s ease infinite alternate;
    }
    @keyframes meshAnim {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 100%; }
    }
    
    * { scrollbar-width:thin; scrollbar-color:var(--bg4) transparent; }
    *::-webkit-scrollbar { width:6px; height:6px; }
    *::-webkit-scrollbar-track { background:transparent; }
    *::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:99px; }
    *::-webkit-scrollbar-thumb:hover { background:var(--text3); }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div id="root"></div>
</body>
</html>
